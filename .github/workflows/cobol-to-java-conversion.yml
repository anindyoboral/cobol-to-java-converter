name: COBOL to Java Conversion with Auto-Commit

on:
  push:
    branches:
      - main
    paths:
      - 'cobol-sources/**'
  workflow_dispatch:

jobs:
  convert-and-commit:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Create required directories
        run: |
          mkdir -p src/main/java/com/cobolconverter
          mkdir -p target/classes
          mkdir -p java-generated

      - name: Build converter
        run: |
          if [ -f src/main/java/com/cobolconverter/CobolToJavaConverter.java ]; then
            javac src/main/java/com/cobolconverter/CobolToJavaConverter.java -d target/classes
          else
            echo "Warning: CobolToJavaConverter.java not found"
          fi

      - name: Run COBOL to Java conversion
        run: |
          if [ -f target/classes/com/cobolconverter/CobolToJavaConverter.class ]; then
            java -cp target/classes com.cobolconverter.CobolToJavaConverter
          else
            echo "Warning: Compiled converter class not found"
          fi

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions Bot"

      - name: Commit converted files
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add java-generated/
            git commit -m "chore: auto-convert COBOL to Java [skip ci]"
            git push origin ${{ github.ref_name }}
          else
            echo "No changes to commit"
          fi
